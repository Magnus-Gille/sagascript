name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Test frontend lifecycle helpers
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # Workspace members. Bare cargo commands above cover only the root (app)
      # package; these cover sagascript-core and sagascript-cli explicitly.
      # NOTE: core is tested in its own invocation so its no-features build is
      # exercised — combining -p flags would unify features across packages.
      - name: Cargo test (sagascript-core, no features)
        working-directory: src-tauri
        run: cargo test -p sagascript-core

      - name: Cargo test (sagascript-cli)
        working-directory: src-tauri
        run: cargo test -p sagascript-cli

      - name: Cargo clippy (sagascript-core, no features)
        working-directory: src-tauri
        run: cargo clippy -p sagascript-core --all-targets -- -D warnings

      - name: Cargo clippy (sagascript-cli)
        working-directory: src-tauri
        run: cargo clippy -p sagascript-cli --all-targets -- -D warnings

      # `diarization` feature coverage (#68): gates ~1,771 lines of speaker
      # diarization code (crates/sagascript-core/src/diarization/) and its
      # CLI wiring (--diarize / --diarize-threshold in sagascript-cli) that
      # otherwise never compile in CI. All diarization unit tests are pure
      # (math/serialization/clustering logic) — none load an ONNX model file
      # at runtime, so this layer needs no downloaded artifacts. The macOS
      # model-backed smoke tests below are also release-critical and fail the
      # job on inference regressions.
      - name: Cargo check (sagascript-core, diarization)
        working-directory: src-tauri
        run: cargo check -p sagascript-core --features diarization

      - name: Cargo check (sagascript-cli, diarization)
        working-directory: src-tauri
        run: cargo check -p sagascript-cli --features diarization

      - name: Cargo test (sagascript-core, diarization)
        working-directory: src-tauri
        run: cargo test -p sagascript-core --features diarization

      - name: Cargo test (sagascript-cli, diarization)
        working-directory: src-tauri
        run: cargo test -p sagascript-cli --features diarization

      - name: Cargo clippy (sagascript-core, diarization)
        working-directory: src-tauri
        run: cargo clippy -p sagascript-core --features diarization --all-targets -- -D warnings

      - name: Cargo clippy (sagascript-cli, diarization)
        working-directory: src-tauri
        run: cargo clippy -p sagascript-cli --features diarization --all-targets -- -D warnings

      - name: Svelte check
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Build Tauri app
        run: npx tauri build

      # --- Tier 1: CLI smoke tests (no model needed) ---

      - name: Smoke test — help and version
        run: |
          BINARY=src-tauri/target/release/sagascript
          $BINARY --help
          $BINARY transcribe --help
          $BINARY record --help

      - name: Smoke test — config management
        run: |
          BINARY=src-tauri/target/release/sagascript
          $BINARY config list
          $BINARY config get language
          $BINARY config set language sv
          $BINARY config get language | grep -q sv
          $BINARY config reset language
          $BINARY config get language | grep -q en
          $BINARY config path

      - name: Smoke test — model listing and formats
        run: |
          BINARY=src-tauri/target/release/sagascript
          $BINARY list-models
          $BINARY formats

      - name: Smoke test — shell completions
        run: |
          BINARY=src-tauri/target/release/sagascript
          $BINARY completions zsh > /dev/null
          $BINARY completions bash > /dev/null

      # --- Tier 2: Model download + transcription ---

      - name: Smoke test — download model and transcribe
        run: |
          BINARY=src-tauri/target/release/sagascript
          $BINARY download-model nb-whisper-tiny
          RESULT=$($BINARY transcribe --language no --model nb-whisper-tiny test-audio/norwegian-short-3s.mp3)
          echo "Transcription: $RESULT"
          echo "$RESULT" | grep -iq "stortinget"

      - name: Smoke test — transcribe with JSON output
        run: |
          BINARY=src-tauri/target/release/sagascript
          RESULT=$($BINARY transcribe --json --language no --model nb-whisper-tiny test-audio/norwegian-short-3s.mp3)
          echo "JSON: $RESULT"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['text']; assert d['language']=='no'; assert d['duration_seconds']>0"

  check-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            build-essential \
            file \
            xdotool

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # GUI build: compiles the cfg(target_os = "linux") Tauri path so it can't
      # silently break on a future PR (the macOS/Windows runners never see it).
      # The bare invocation covers the root (app) package, which pulls in
      # sagascript-core with the `record` feature.
      - name: Cargo check (GUI app)
        working-directory: src-tauri
        run: cargo check

      - name: Cargo clippy (GUI app)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # Headless CLI (no Tauri) — the sagascript-cli member crate. Default
      # features include `record` (cpal/ALSA); the --no-default-features runs
      # cover the pure batch-transcribe build, which must need no ALSA.
      - name: Cargo check (headless CLI, with record)
        working-directory: src-tauri
        run: cargo check -p sagascript-cli

      - name: Cargo check (headless CLI, batch-only)
        working-directory: src-tauri
        run: cargo check -p sagascript-cli --no-default-features

      - name: Cargo clippy (headless CLI, batch-only)
        working-directory: src-tauri
        run: cargo clippy -p sagascript-cli --all-targets --no-default-features -- -D warnings

      - name: Cargo test (headless CLI, batch-only)
        working-directory: src-tauri
        run: cargo test -p sagascript-cli --no-default-features

      # Run core's own tests on Linux too — cargo does not run dependency
      # crates' tests, so without these steps core is only compile-checked
      # here (its tests would run on macOS/Windows only).
      - name: Cargo test (sagascript-core, no features)
        working-directory: src-tauri
        run: cargo test -p sagascript-core

      - name: Cargo test (sagascript-core, with record)
        working-directory: src-tauri
        run: cargo test -p sagascript-core --features record

      # Regression guard for the no-ALSA property (#66): the batch-only CLI
      # dependency tree must contain neither cpal nor alsa. (grep -c would
      # exit 1 on zero matches and fail the step, hence the if/grep -q form.)
      - name: Assert batch-only CLI has no ALSA/cpal dependency
        working-directory: src-tauri
        run: |
          if cargo tree -p sagascript-cli --no-default-features -e normal | grep -qiE 'alsa|cpal'; then
            echo "ERROR: cpal/ALSA leaked into the batch-only dependency tree:"
            cargo tree -p sagascript-cli --no-default-features -e normal | grep -iE 'alsa|cpal'
            exit 1
          fi
          echo "OK: no cpal/ALSA in batch-only tree"

  check-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            src-tauri\target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # Workspace members (see the macOS job for why these are separate
      # invocations: combined -p flags would unify features across packages).
      - name: Cargo test (sagascript-core, no features)
        working-directory: src-tauri
        run: cargo test -p sagascript-core

      - name: Cargo test (sagascript-cli)
        working-directory: src-tauri
        run: cargo test -p sagascript-cli

      - name: Cargo clippy (sagascript-core, no features)
        working-directory: src-tauri
        run: cargo clippy -p sagascript-core --all-targets -- -D warnings

      - name: Cargo clippy (sagascript-cli)
        working-directory: src-tauri
        run: cargo clippy -p sagascript-cli --all-targets -- -D warnings

      - name: Build Tauri app
        run: npx tauri build

      # --- CLI smoke tests (Windows / PowerShell) ---

      - name: Smoke test — help and version
        run: |
          $env:BINARY = "src-tauri\target\release\sagascript.exe"
          & $env:BINARY --help
          & $env:BINARY transcribe --help
          & $env:BINARY record --help

      - name: Smoke test — config management
        run: |
          $env:BINARY = "src-tauri\target\release\sagascript.exe"
          & $env:BINARY config list
          & $env:BINARY config get language
          & $env:BINARY config set language sv
          $result = & $env:BINARY config get language
          if ($result -notmatch "sv") { throw "Expected 'sv'" }
          & $env:BINARY config reset language
          $result = & $env:BINARY config get language
          if ($result -notmatch "en") { throw "Expected 'en'" }
          & $env:BINARY config path

      - name: Smoke test — model listing and formats
        run: |
          $env:BINARY = "src-tauri\target\release\sagascript.exe"
          & $env:BINARY list-models
          & $env:BINARY formats

      - name: Smoke test — shell completions
        run: |
          $env:BINARY = "src-tauri\target\release\sagascript.exe"
          & $env:BINARY completions powershell | Out-Null

      - name: Smoke test — download model and transcribe
        continue-on-error: true  # Model download/GPU availability varies across CI runners
        run: |
          $env:BINARY = "src-tauri\target\release\sagascript.exe"
          & $env:BINARY download-model nb-whisper-tiny
          $result = & $env:BINARY transcribe --language no --model nb-whisper-tiny test-audio/norwegian-short-3s.mp3
          Write-Host "Transcription: $result"
          if ($result -notmatch "(?i)stortinget") { throw "Expected 'stortinget' in output" }

      - name: Smoke test — transcribe with JSON output
        continue-on-error: true  # Model download/GPU availability varies across CI runners
        shell: cmd
        run: |
          set BINARY=src-tauri\target\release\sagascript.exe
          %BINARY% transcribe --json --language no --model nb-whisper-tiny test-audio/norwegian-short-3s.mp3 > json_output.txt 2>nul
          type json_output.txt
          findstr /C:"text" json_output.txt
          findstr /C:"duration_seconds" json_output.txt
          findstr /C:"language" json_output.txt
